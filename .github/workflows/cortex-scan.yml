name: Cortex Security Pipeline - Dynamic DevSecOps

on:
  push:
    branches:
      - main

jobs:
  # ---------------------------------------------------------
  # STAGE 1: SEGURIDAD ESTÁTICA (Escaneo de código e IaC)
  # ---------------------------------------------------------
  security-scan:
    name: 1. Escaneo de IaC y Código
    runs-on: self-hosted # Ejecuta en el runner de tu Escritorio
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Descargar e Instalar cortexcli
        run: |
          set -e
          crtx_resp=$(curl -s "${{ secrets.CORTEX_API_URL }}/public_api/v1/unified-cli/releases/download-link?os=linux&architecture=amd64" \
            -H "x-xdr-auth-id: ${{ secrets.CORTEX_API_KEY_ID }}" \
            -H "Authorization: ${{ secrets.CORTEX_API_KEY }}")
          
          crtx_url=$(echo "$crtx_resp" | jq -r ".signed_url")
          if [ -z "$crtx_url" ] || [ "$crtx_url" = "null" ]; then
            echo "::error::No se pudo obtener el signed_url."
            exit 1
          fi
          
          curl -s -o cortexcli "$crtx_url"
          chmod +x cortexcli
          sudo mv cortexcli /usr/local/bin/cortexcli

      - name: Cortex Scan - IaC y Código
        run: |
          set -e
          cortexcli \
            --api-base-url "${{ secrets.CORTEX_API_URL }}" \
            --api-key "${{ secrets.CORTEX_API_KEY }}" \
            --api-key-id "${{ secrets.CORTEX_API_KEY_ID }}" \
            code scan \
            --directory "${{ github.workspace }}" \
            --repo-id "${{ github.repository }}" \
            --branch "${{ github.ref_name }}" \
            --source "CORTEX_CLI" \
            --upload-mode no-upload \
            --create-repo-if-missing

  # ---------------------------------------------------------
  # STAGE 2: CONSTRUCCIÓN, ESCANEO DINÁMICO Y DESPLIEGUE
  # ---------------------------------------------------------
  build-and-image-scan:
    name: 2. Construcción, Escaneo y Despliegue
    needs: security-scan
    runs-on: self-hosted # Ejecuta en el runner de tu Escritorio
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Descargar e Instalar cortexcli (Runner 2)
        run: |
          set -e
          crtx_resp=$(curl -s "${{ secrets.CORTEX_API_URL }}/public_api/v1/unified-cli/releases/download-link?os=linux&architecture=amd64" \
            -H "x-xdr-auth-id: ${{ secrets.CORTEX_API_KEY_ID }}" \
            -H "Authorization: ${{ secrets.CORTEX_API_KEY }}")
          
          crtx_url=$(echo "$crtx_resp" | jq -r ".signed_url")
          if [ -z "$crtx_url" ] || [ "$crtx_url" = "null" ]; then
            echo "::error::No se pudo obtener el signed_url."
            exit 1
          fi
          
          curl -s -o cortexcli "$crtx_url"
          chmod +x cortexcli
          sudo mv cortexcli /usr/local/bin/cortexcli

      - name: Construir imagen Docker
        run: |
          # Nombre completamente en minúsculas obligatorio para Docker build
          docker build -t calo-cortexcli-prueba:latest .
          echo "¡Imagen calo-cortexcli-prueba construida localmente con éxito!"

      - name: Cortex Scan - Escaneo de la Imagen (CVEs)
        run: |
          set -e
          echo "Buscando vulnerabilidades en la imagen calo-cortexcli-prueba..."
          cortexcli \
            --api-base-url "${{ secrets.CORTEX_API_URL }}" \
            --api-key "${{ secrets.CORTEX_API_KEY }}" \
            --api-key-id "${{ secrets.CORTEX_API_KEY_ID }}" \
            image scan \
            --ci-pipeline-id "${{ github.repository }}" \
            --ci-build-id "${{ github.run_id }}" \
            --name "Calo-CortexCLI-prueba" \
            calo-cortexcli-prueba:latest

      - name: 3. Despliegue Automático en Docker Desktop
        run: |
          echo "Buscando y removiendo versiones antiguas del contenedor si existen..."
          docker rm -f Calo-CortexCLI-prueba || true
          
          echo "Lanzando el nuevo contenedor en Docker Desktop..."
          # El nombre del contenedor vivo final sí puede llevar mayúsculas
          docker run -d -p 8080:80 --name Calo-CortexCLI-prueba calo-cortexcli-prueba:latest
          
          echo "¡Despliegue finalizado! Revisa tu aplicación Docker Desktop."
