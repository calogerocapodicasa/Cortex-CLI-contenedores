name: Cortex Security Pipeline - Full DevSecOps

on:
  push:
    branches:
      - main

jobs:
  full-security-scan:
    name: Análisis de Código e Imagen
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Descargar e Instalar cortexcli
        run: |
          set -e
          crtx_resp=$(curl -s "${{ secrets.CORTEX_API_URL }}/public_api/v1/unified-cli/releases/download-link?os=linux&architecture=amd64" \
            -H "x-xdr-auth-id: ${{ secrets.CORTEX_API_KEY_ID }}" \
            -H "Authorization: ${{ secrets.CORTEX_API_KEY }}")
          
          crtx_url=$(echo "$crtx_resp" | jq -r ".signed_url")
          if [ -z "$crtx_url" ] || [ "$crtx_url" = "null" ]; then
            echo "::error::No se pudo obtener el signed_url."
            exit 1
          fi
          
          curl -s -o cortexcli "$crtx_url"
          chmod +x cortexcli
          sudo mv cortexcli /usr/local/bin/cortexcli

      - name: 1. Escaneo de Código (IaC / Dockerfile)
        run: |
          set -e
          echo "Iniciando análisis estático del código..."
          cortexcli \
            --api-base-url "${{ secrets.CORTEX_API_URL }}" \
            --api-key "${{ secrets.CORTEX_API_KEY }}" \
            --api-key-id "${{ secrets.CORTEX_API_KEY_ID }}" \
            code scan \
            --directory "${{ github.workspace }}" \
            --repo-id "${{ github.repository }}" \
            --branch "${{ github.ref_name }}" \
            --source "CORTEX_CLI" \
            --create-repo-if-missing

      - name: 2. Construir la imagen Docker
        run: |
          echo "El código es seguro. Procediendo a construir la imagen..."
          docker build -t mi-app-debian:${{ github.sha }} .
          echo "Imagen local construida con éxito."

      - name: 3. Escaneo de Imagen (Vulnerabilidades / CVEs)
        run: |
          set -e
          echo "Iniciando análisis de composición en la imagen construida..."
          cortexcli \
            --api-base-url "${{ secrets.CORTEX_API_URL }}" \
            --api-key "${{ secrets.CORTEX_API_KEY }}" \
            --api-key-id "${{ secrets.CORTEX_API_KEY_ID }}" \
            image scan \
            --ci-pipeline-id "${{ github.repository }}" \
            --ci-build-id "${{ github.run_id }}" \
            --name "mi-app-debian" \
            mi-app-debian:${{ github.sha }}
